<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Question for Anahí ❤️</title>

<style>
body{
    margin:0;
    font-family:'Arial', sans-serif;
    background:linear-gradient(135deg, #ff6b9d, #c44569, #ffa502, #26de81, #4ecdc4);
    background-size: 400% 400%;
    animation: gradientShift 8s ease infinite;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

@keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.card{
    background:white;
    padding:50px;
    border-radius:30px;
    text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,.3);
    position:relative;
    width:400px;
    animation: popIn 0.6s ease-out;
}

@keyframes popIn {
    from {
        transform: scale(0.8);
        opacity: 0;
    }
    to {
        transform: scale(1);
        opacity: 1;
    }
}

h1{
    color:#ff6b9d;
    font-size:32px;
    margin-bottom:10px;
    text-shadow: 2px 2px 4px rgba(255, 107, 157, 0.2);
}

.subtitle{
    color:#c44569;
    font-size:18px;
    margin-bottom:25px;
    font-weight:bold;
}

p{
    font-size:20px;
    color:#333;
    line-height:1.6;
    margin:20px 0;
}

.date-info{
    background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
    padding:15px;
    border-radius:15px;
    margin:20px 0;
    font-size:18px;
    color:#c44569;
    font-weight:bold;
}

.button-container{
    display:flex;
    gap:20px;
    justify-content:center;
    margin-top:30px;
}

button{
    padding:15px 35px;
    font-size:18px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    transition:all .3s ease;
    font-weight:bold;
    text-transform:uppercase;
    letter-spacing:1px;
}

#yes{
    background: linear-gradient(135deg, #ff6b9d, #ff1654);
    color:white;
    box-shadow: 0 8px 20px rgba(255, 27, 84, 0.4);
}

#yes:hover{
    transform: scale(1.1);
    box-shadow: 0 12px 30px rgba(255, 27, 84, 0.6);
}

#no{
    background: linear-gradient(135deg, #ffa502, #ff7675);
    color:white;
    position:absolute;
    box-shadow: 0 8px 20px rgba(255, 165, 2, 0.4);
}

#no:hover{
    transform: scale(1.05);
}

#message{
    font-size:28px;
    color:#ff6b9d;
    margin-top:20px;
    display:none;
    animation: fadeIn 0.8s ease-in;
    line-height:1.8;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

.emoji-rain {
    position: fixed;
    font-size: 40px;
    animation: fall 3s linear infinite;
    pointer-events: none;
}

@keyframes fall {
    to {
        transform: translateY(100vh) rotate(360deg);
        opacity: 0;
    }
}

.confetti-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    font-size: 40px;
    display: flex;
    flex-wrap: wrap;
    overflow: hidden;
}

.confetti {
    position: absolute;
    animation: confettiFall 3s ease-in forwards;
}

@keyframes confettiFall {
    to {
        transform: translateY(100vh) rotate(720deg);
        opacity: 0;
    }
}
</style>
</head>

<body>

<div class="card">
<h1>Hi Beautiful Anahí ❤️💕</h1>
<div class="subtitle">From Your Cute Husband 😘</div>

<p>Will you go on a special date with me? 💑</p>

<div class="date-info">
📅 Saturday, July 11th 💫
</div>

<p>I want to spend the day with the love of my life! 💕✨</p>

<div class="button-container">
    <button id="yes">YES 💖</button>
    <button id="no">No 😅</button>
</div>

<div id="message">
YAY!! ❤️💕💖💘💗💞<br><br>
I can't wait to spend Saturday with you, my love! 🥰💑
</div>

</div>

<script>
const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");

function moveButton(){
    const x = Math.random()*(window.innerWidth-150);
    const y = Math.random()*(window.innerHeight-60);

    noBtn.style.position="fixed";
    noBtn.style.left=x+"px";
    noBtn.style.top=y+"px";
}

noBtn.addEventListener("mouseover",moveButton);
noBtn.addEventListener("click",moveButton);

yesBtn.onclick=function(){
    document.querySelector("p").style.display="none";
    document.querySelector(".date-info").style.display="none";
    document.querySelector(".button-container").style.display="none";
    document.querySelector(".subtitle").style.display="none";
    document.getElementById("message").style.display="block";

    // Create colorful emoji rain
    const emojis = ['❤️', '💕', '💖', '💗', '💘', '💞', '💝', '🌹', '💑', '👰', '🤵', '💐', '✨', '🎉'];
    
    for(let i = 0; i < 50; i++){
        const emoji = document.createElement('div');
        emoji.className = 'emoji-rain';
        emoji.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        emoji.style.left = Math.random() * 100 + '%';
        emoji.style.top = Math.random() * -50 + 'px';
        emoji.style.delay = Math.random() * 0.5 + 's';
        document.body.appendChild(emoji);
    }

    // Create confetti
    const confettiContainer = document.createElement('div');
    confettiContainer.className = 'confetti-container';
    
    const confettiEmojis = ['❤️', '💕', '💖', '💗', '💘', '💞', '💝', '🌹', '✨', '🎉', '💑'];
    
    for(let i = 0; i < 40; i++){
        const confetti = document.createElement('div');
        confetti.className = 'confetti';
        confetti.textContent = confettiEmojis[Math.floor(Math.random() * confettiEmojis.length)];
        confetti.style.left = Math.random() * 100 + 'vw';
        confetti.style.top = Math.random() * 100 + 'vh';
        confetti.style.animationDelay = Math.random() * 0.5 + 's';
        confettiContainer.appendChild(confetti);
    }
    
    document.body.appendChild(confettiContainer);
}
</script>

</body>
</html>
